<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KaryoVision Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="dashboard-body page-{{ request.endpoint }}">
    <!-- Animated Background Elements -->
    <div class="bg-gradient-anim"></div>
    <div class="bg-particles" id="particles-container">
        <!-- Static soft blurred blobs for SaaS feel -->
        <div class="glow-blob blob-1"></div>
        <div class="glow-blob blob-2"></div>
        <div class="glow-blob blob-3"></div>
    </div>

    <!-- Navbar -->
    <header class="top-navbar">
        <div class="navbar-left">
            <i class="fa-solid fa-staff-snake logo-icon"></i>
            <span class="logo-text">KaryoVision</span>
        </div>
        <div class="navbar-right">
            <a href="{{ url_for('index') }}" class="nav-link"><i class="fa-solid fa-house"></i> Home</a>
            {% if current_user.is_authenticated %}
                <span class="nav-link"><i class="fa-solid fa-user"></i> {{ current_user.username }}</span>
                <a href="{{ url_for('logout') }}" class="nav-link logout-btn"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
            {% else %}
                <a href="{{ url_for('login') }}" class="nav-link"><i class="fa-solid fa-right-to-bracket"></i> Login</a>
                <a href="{{ url_for('register') }}" class="nav-link"><i class="fa-solid fa-user-plus"></i> Register</a>
            {% endif %}
        </div>
    </header>

    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <ul class="sidebar-menu">
                <li><a href="{{ url_for('index') }}" class="menu-item {% if request.endpoint == 'index' %}active{% endif %}"><i class="fa-solid fa-chart-line"></i> Dashboard</a></li>
                <li><a href="{{ url_for('upload') }}" class="menu-item {% if request.endpoint == 'upload' %}active{% endif %}"><i class="fa-solid fa-cloud-arrow-up"></i> Upload Image</a></li>
                <li><a href="{{ url_for('reports') }}" class="menu-item {% if request.endpoint == 'reports' %}active{% endif %}"><i class="fa-solid fa-file-medical"></i> Reports</a></li>
            </ul>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content page-transition">
            {% block content %}{% endblock %}
        </main>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
