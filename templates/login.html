<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KaryoVision - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            background-image: url("{{ url_for('static', filename='login_bg.jpg') }}");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #E0E7FF;
        }
        .auth-container {
            background: rgba(30, 41, 59, 0.95);
            border: 1px solid #475569;
            border-radius: 15px;
            padding: 40px 30px;
            box-shadow: 0 0 20px rgba(109, 40, 217, 0.3);
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
        }
        h2 {
            text-align: center;
            margin-top: 0;
            margin-bottom: 25px;
            font-size: 28px;
            font-weight: 700;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            background: #334155;
            border: 1px solid #475569;
            color: #E0E7FF;
            border-radius: 8px;
            box-sizing: border-box;
            outline: none;
            transition: border 0.3s;
            font-family: inherit;
        }
        .form-group input:focus {
            border-color: #8B5CF6;
        }
        .auth-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(#6D28D9, #8B5CF6);
            color: #E0E7FF;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            font-family: inherit;
        }
        .auth-btn:hover {
            box-shadow: 0 0 15px rgba(109, 40, 217, 0.6);
            transform: scale(1.02);
        }
        .auth-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }
        .auth-footer a {
            color: #8B5CF6;
            text-decoration: none;
            font-weight: 500;
        }
        .auth-footer a:hover {
            text-decoration: underline;
        }
        .flash-messages {
            margin-bottom: 20px;
        }
        .flash-message {
            padding: 10px;
            border-radius: 8px;
            background: #ef4444;
            color: white;
            text-align: center;
            margin-bottom: 10px;
            font-size: 14px;
        }
        .flash-message.success {
            background: #10b981;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <h2><i class="fa-solid fa-staff-snake"></i> KaryoVision</h2>
        <p style="text-align: center; margin-bottom: 30px; color: #a5b4fc;">Welcome back! Please login.</p>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="flash-messages">
                    {% for category, message in messages %}
                        <div class="flash-message {{ category }}">{{ message }}</div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required placeholder="doctor@hospital.com">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="auth-btn">Login <i class="fa-solid fa-right-to-bracket"></i></button>
        </form>
        
        <div class="auth-footer">
            Don't have an account? <a href="{{ url_for('register') }}">Register here</a>
        </div>
    </div>
</body>
</html>
