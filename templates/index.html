<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KaryoVision - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <i class="fa-solid fa-staff-snake login-logo"></i>
                <h1>KaryoVision</h1>
                <p>Medical Analytics Dashboard</p>
            </div>
            
            <form action="{{ url_for('upload') }}" method="GET" class="login-form">
                <div class="form-group">
                    <label><i class="fa-solid fa-user-doctor"></i> Doctor ID</label>
                    <input type="text" placeholder="Enter ID" required>
                </div>
                <div class="form-group">
                    <label><i class="fa-solid fa-lock"></i> Password</label>
                    <input type="password" placeholder="Password" required>
                </div>
                <!-- For demo purposes, the login just redirects to upload dashboard -->
                <button type="submit" class="btn-primary login-btn">Secure Login <i class="fa-solid fa-arrow-right"></i></button>
            </form>
            <div class="login-footer">
                <p>Authorized Hospital Staff Only</p>
            </div>
        </div>
    </div>
</body>
</html>
